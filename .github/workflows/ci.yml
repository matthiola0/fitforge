name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when new commits land
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + unit + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — action-setup@v4 reads `packageManager` field from package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (core + web)
        run: pnpm typecheck

      - name: Unit tests (core)
        run: pnpm --filter @fitforge/core test

      - name: Build web (production bundle)
        run: pnpm --filter @fitforge/web build

      - name: Install Playwright browser
        run: pnpm --filter @fitforge/web exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm --filter @fitforge/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report
          retention-days: 14
